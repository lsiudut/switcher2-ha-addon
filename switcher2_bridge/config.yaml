name: Switcher2 Bridge
slug: switcher2_bridge
description: Expose switcher2 Modbus devices to Home Assistant through the ESPHome native API
version: 0.1.5
url: https://github.com/lsiudut/switcher2-ha-addon
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
uart: true
usb: true
udev: true
ingress: true
ingress_port: 8090
panel_icon: mdi:toggle-switch
panel_title: Switcher2
ports:
  6053/tcp: 6053
  8090/tcp: null
ports_description:
  6053/tcp: ESPHome native API
  8090/tcp: Optional direct web UI access
map:
  - type: addon_config
    read_only: false
    path: /config
options:
  config_file: config.yaml
schema:
  config_file: str
